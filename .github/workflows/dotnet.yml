# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_NAME: ASecureNote

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Extract version from csproj
      id: extract
      run: |
        VERSION=$(grep -oP '(?<=<AssemblyVersion>)[^<]+' ASecureNoteMaker/ASecureNoteMaker.csproj)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"

  build-android:
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install MAUI Android workload
      run: dotnet workload install maui-android
    - name: Restore dependencies
      run: dotnet restore ASecureNoteMaker/ASecureNoteMaker.csproj -p:TargetFramework=net10.0-android
    - name: Build Android
      run: dotnet build ASecureNoteMaker/ASecureNoteMaker.csproj -p:TargetFramework=net10.0-android --no-restore -c Release
    - name: Rename APK
      run: |
        mkdir -p artifacts
        cp ASecureNoteMaker/bin/Release/net10.0-android/*.apk "artifacts/${{ env.APP_NAME }} - ${{ env.VERSION }}.apk"
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: artifacts/*.apk

  build-windows:
    runs-on: windows-latest
    needs: get-version
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install MAUI Windows workload
      run: dotnet workload install maui
    - name: Restore dependencies
      run: dotnet restore ASecureNoteMaker/ASecureNoteMaker.csproj -p:TargetFramework=net10.0-windows10.0.19041.0 -r win-x64
    - name: Build Windows
      run: dotnet build ASecureNoteMaker/ASecureNoteMaker.csproj -p:TargetFramework=net10.0-windows10.0.19041.0 -r win-x64 -p:PublishReadyToRun=false --no-restore -c Release
    - name: Zip Windows build
      run: Compress-Archive -Path ASecureNoteMaker/bin/Release/net10.0-windows10.0.19041.0/* -DestinationPath "${{ env.APP_NAME }} - ${{ env.VERSION }}.zip"
    - name: Upload Windows build
      uses: actions/upload-artifact@v4
      with:
        name: windows-app
        path: "${{ env.APP_NAME }} - ${{ env.VERSION }}.zip"

  release:
    needs: [get-version, build-android, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.get-version.outputs.version }}
    steps:
    - name: Download Android APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: artifacts/android
    - name: Download Windows build
      uses: actions/download-artifact@v4
      with:
        name: windows-app
        path: artifacts/windows
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}-build.${{ github.run_number }}
        name: "${{ env.APP_NAME }} - ${{ env.VERSION }}"
        body: "Automated release from commit ${{ github.sha }}"
        files: |
          artifacts/android/*.apk
          artifacts/windows/*.zip

  # iOS build requires Xcode 26.3 but GitHub runners only have 16.4 — re-enable when runners are updated
  # build-ios:
  #   runs-on: macos-latest
